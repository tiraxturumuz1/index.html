<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Dao - App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 50px; background: #f0f2f5; }
        .container { background: white; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 90%; width: 400px; }
        h1 { color: #5c6bc0; margin-bottom: 10px; }
        button { padding: 12px 25px; font-size: 16px; border: none; border-radius: 30px; cursor: pointer; margin-top: 20px; transition: 0.3s; width: 100%; }
        .login-btn { background: #5c6bc0; color: white; display: none; }
        .login-btn:hover { background: #3f51b5; }
        .pay-btn { background: #4caf50; color: white; display: none; }
        .logout-btn { background: transparent; color: #f44336; border: 1px solid #f44336; margin-top: 15px; }
        #status { margin-top: 20px; font-size: 14px; color: #555; word-break: break-all; }
        #user-info { display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pi Dao</h1>
        <p id="msg">Initializing SDK...</p>

        <button id="login-button" class="login-btn">Login with Pi</button>

        <div id="user-info">
            <p id="username-display"></p>
            <button id="pay-button" class="pay-btn">Pay 1 Pi</button>
            <button class="logout-btn" onclick="location.reload()">Refresh / Logout</button>
        </div>

        <div id="status"></div>
    </div>

    <!-- Pi SDK -->
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        const statusDiv = document.getElementById('status');
        const msg = document.getElementById('msg');
        const loginBtn = document.getElementById('login-button');
        const userInfoDiv = document.getElementById('user-info');
        const usernameDisplay = document.getElementById('username-display');
        const payBtn = document.getElementById('pay-button');

        // تنظیمات SDK
        Pi.init({
            version: "2.0",
            sandbox: true,
            appId: "pidao-ncwa",
            clientId: "JBFRI86jX28qFUXkhYDYzxh3v32QmDK_GpP2A8HiVJ4",
            redirectUri: "https://daotest.github.io/index.html"
        }).then(() => {
            msg.textContent = "SDK Connected!";
            statusDiv.textContent = "Ready to authenticate.";
            loginBtn.style.display = "block";
        }).catch(err => {
            msg.textContent = "Initialization Error";
            statusDiv.textContent = err.message;
            console.error("Init Error:", err);
        });

        // فرآیند احراز هویت
        loginBtn.addEventListener('click', () => {
            statusDiv.textContent = "Authenticating...";
            Pi.authenticate(['username', 'payments'], (incompletePayment) => {
                console.log('Incomplete payment:', incompletePayment);
            }).then(auth => {
                usernameDisplay.textContent = "Welcome, @" + auth.user.username;
                userInfoDiv.style.display = "block";
                loginBtn.style.display = "none";
                statusDiv.textContent = "Authenticated successfully.";
            }).catch(err => {
                statusDiv.textContent = "Auth Error: " + (err.message || err);
                console.error("Auth Error:", err);
            });
        });

        // دکمه پرداخت
        payBtn.addEventListener('click', () => {
            statusDiv.textContent = "Processing payment...";
            Pi.createPayment({
                amount: 1,
                memo: "Test payment",
                metadata: { orderId: "12345" }
            }, {
                onReadyForServerApproval: (paymentId) => {
                    statusDiv.textContent = "Payment created! Check Developer Portal.";
                },
                onReadyForServerCompletion: (paymentId, txid) => {
                    statusDiv.textContent = "Success! TXID: " + txid;
                },
                onCancel: (paymentId) => {
                    statusDiv.textContent = "Payment cancelled.";
                },
                onError: (err, payment) => {
                    statusDiv.textContent = "Payment Error: " + err.message;
                }
            });
        });
    </script>
</body>
</html>

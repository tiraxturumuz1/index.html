<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Payment Debug - Full Callbacks</title>
</head>
<body>
    <button id="login-btn">Login</button>
    <button id="pay-btn" style="display:none">Pay 10 Pi (Test)</button>
    <div id="status"></div>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
        const statusDiv = document.getElementById('status');
        const loginBtn = document.getElementById('login-btn');
        const payBtn = document.getElementById('pay-btn');

        Pi.init({
            version: "2.0",
            sandbox: true,
            appId: "pidao-pi-2uk8",
            clientId: "c_1Hj75SyO_wbM4BUaxgVzuOmplNnrDj_2pWxDUkD8Q",
            redirectUri: "https://tiraxturumuz1.github.io/index.html"
        }).then(() => {
            statusDiv.textContent = "✅ SDK Initialized. Click Login.";
            loginBtn.style.display = "block";
        }).catch(err => {
            statusDiv.textContent = "❌ Init Error: " + err.message;
        });

        loginBtn.onclick = () => {
            Pi.authenticate(['username', 'payments'], (incompletePayment) => {
                console.log("Incomplete payment found:", incompletePayment);
            }).then(auth => {
                if (auth?.user) {
                    statusDiv.textContent = "👤 Logged in: " + auth.user.username;
                    payBtn.style.display = "block";
                    loginBtn.style.display = "none";
                }
            }).catch(err => {
                statusDiv.textContent = "❌ Auth Error: " + (err.message || err);
            });
        };

        payBtn.onclick = () => {
            payBtn.disabled = true;
            statusDiv.textContent = "⏳ Creating payment...";

            // پرداخت با callbackهای کامل
            Pi.createPayment({
                amount: 10,                   // افزایش مبلغ
                memo: "Final test payment",
                metadata: { debug: true }
            }, {
                // تایید سمت سرور (در Frontend mode خودکار است اما callback داده می‌شود)
                onReadyForServerApproval: (paymentId) => {
                    console.log("✅ onReadyForServerApproval:", paymentId);
                    statusDiv.textContent = "✅ Payment approved by user. Completing...";
                },
                // تکمیل سمت سرور
                onReadyForServerCompletion: (paymentId, txid) => {
                    console.log("✅ onReadyForServerCompletion:", paymentId, txid);
                    statusDiv.textContent = "🎉 Payment completed! TXID: " + txid;
                    payBtn.disabled = false;
                },
                // کنسل توسط کاربر
                onCancel: (paymentId) => {
                    console.log("⚠️ onCancel:", paymentId);
                    statusDiv.textContent = "❌ Payment cancelled by user.";
                    payBtn.disabled = false;
                },
                // خطا
                onError: (error, payment) => {
                    console.error("❌ onError:", error, payment);
                    statusDiv.textContent = "❌ Payment error: " + error.message;
                    payBtn.disabled = false;
                }
            }).then(result => {
                console.log("Payment resolved:", result);
            }).catch(error => {
                console.error("Payment rejected:", error);
                statusDiv.textContent = "❌ Payment failed: " + (error.message || error);
                payBtn.disabled = false;
            });
        };
    </script>
</body>
</html>

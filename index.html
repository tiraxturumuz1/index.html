<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pi Final Test</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #status { padding: 15px; margin: 20px; border: 1px solid #ccc; background: #f9f9f9; min-height: 40px; }
        .error { color: red; border-color: red !important; background: #fee !important; }
        .success { color: green; border-color: green !important; background: #efe !important; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Pi Auth Tester</h1>
    <div id="status">Initializing...</div>
    <button id="login-button" style="display:none;">LOGIN WITH PI</button>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <script>
        const statusEl = document.getElementById('status');
        const btn = document.getElementById('login-button');

        function updateStatus(msg, isError = false) {
            statusEl.innerText = msg;
            statusEl.className = isError ? "error" : "success";
            console.log(msg);
        }

        window.onload = function() {
            // تست مرحله اول: Init
            Pi.init({ 
                version: "2.0", 
                sandbox: true, // <--- اگر این کار نکرد، حتماً در کد بعدی آن را false کنید
                appId: "pidao-pi-2uk8",
                clientId: "c_1Hj75SyO_wbM4BUaxgVzuOmplNnrDj_2pWxDUkD8Q",
                redirectUri: "https://tiraxturumuz1.github.io/index.html" 
            }).then(() => {
                updateStatus("Step 1: SDK Initialized Successfully!");
                btn.style.display = "inline-block";
            }).catch((err) => {
                updateStatus("Step 1 ERROR: " + JSON.stringify(err), true);
            });
        };

        btn.onclick = function() {
            updateStatus("Step 2: Attempting to authenticate...");
            
            // اجرای احراز هویت
            Pi.authenticate(['username'], function(err, auth) {
                if (err) {
                    // اگر اینجا خطا داد، یعنی مشکل از تطابق Sandbox یا Redirect URI است
                    updateStatus("Step 2 ERROR (Auth Failed): " + JSON.stringify(err), true);
                    console.error("Auth Error details:", err);
                } else if (auth && auth.user) {
                    updateStatus("Step 3: Success! Welcome " + auth.user.username, false);
                    btn.style.display = "none";
                } else {
                    updateStatus("Step 2 ERROR: No user data returned.", true);
                }
            });
        };
    </script>
</body>
</html>

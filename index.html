<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Auth Fix</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f7f6; }
        .container { background: white; padding: 40px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 80%; }
        #status { margin-top: 20px; padding: 15px; font-size: 14px; border-radius: 5px; border: 1px solid #ccc; min-height: 30px; }
        .error { color: #c62828; background: #ffebee; border-color: #ef9a9a !important; }
        .success { color: #2e7d32; background: #e8f5e9; }
        .login-btn { background-color: #673ab7; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 30px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pi Auth Debug</h1>
        <div id="status">Initializing...</div>
        <button id="login-button" class="login-btn" style="display:none;">LOGIN WITH PI</button>
    </div>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>

    <script>
        const statusDiv = document.getElementById('status');
        const loginButton = document.getElementById('login-button');

        function updateStatus(msg, isError = false) {
            statusDiv.textContent = msg;
            statusDiv.className = isError ? "error" : "success";
        }

        window.onload = function() {
            if (typeof Pi === 'undefined') {
                updateStatus("Error: Pi SDK not loaded!", true);
                return;
            }

            // تست اول: لود شدن اولیه
            // نکته: اگر sandbox: false کار نکرد، دوباره به true برگردانید
            Pi.init({ 
                version: "2.0", 
                sandbox: false, 
                appId: "pidao-pi-2uk8",
                clientId: "c_1Hj75SyO_wbM4BUaxgVzuOmplNnrDj_2pWxDUkD8Q",
                redirectUri: "https://tiraxturumuz1.github.io/index.html" 
            }).then(() => {
                updateStatus("Init Success! Click the button below.");
                loginButton.style.display = "inline-block";
            }).catch((err) => {
                updateStatus("Init Error: " + JSON.stringify(err), true);
            });
        };

        loginButton.onclick = function() {
            updateStatus("Requesting permission...");
            
            // استفاده از setTimeout برای اطمینان از اینکه درخواست خارج از جریان لود اولیه است
            setTimeout(() => {
                Pi.authenticate(['username'], function(err, auth) {
                    if (err) {
                        updateStatus("Auth Error: " + JSON.stringify(err), true);
                    } else if (auth && auth.user) {
                        updateStatus("Success! Welcome " + auth.user.username);
                        loginButton.style.display = "none";
                    } else {
                        updateStatus("Error: No data returned", true);
                    }
                });
            }, 500);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Pi Login Page</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
    <h1>به سایت من خوش آمدید</h1>
    <button id="pi-login-btn">Login with Pi</button>

    <script>
        Pi.init({ version: "2.0", sandbox: true });

        document.getElementById('pi-login-btn').addEventListener('click', async () => {
            try {
                const auth = await Pi.authenticate(['username'], (payment) => {});
                alert("خوش آمدید: " + auth.user.username);
            } catch (err) {
                alert("خطا در ورود: " + err);
            }
        });
    </script>
</body>
</html>
